<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="leaflet.css" />
  <script src="leaflet.js"></script>
  <link rel="stylesheet" href="style.css" />
  <script src="markers.js"></script>
  <script src="js/utility.js"></script>
  <link rel="shortcut icon" href="images/favicon.png"/>
  <title>Specjal on Tour</title>
</head>
<h1>Specjal On Tour</h1>

<div id="toast" class="toast-notification"></div>

<button id="sidebarToggle" class="sidebar-toggle">☰</button>

<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <h2 id="locationsTitle">Locations</h2>
    <div class="header-buttons">
      <button id="worldTourBtn" class="tour-button" title="Zwiedzaj świat ze Specjalem">🌍</button>
      <button id="toggleAllGroups" class="toggle-all-button" title="Collapse All">▼</button>
      <button id="sidebarClose" class="sidebar-close">×</button>
    </div>
  </div>

  <div class="controls-header collapsed" id="controlsHeader">
    <span class="controls-header-title" id="settingsTitle">Settings</span>
    <span class="controls-header-arrow">▼</span>
  </div>

  <div class="sidebar-controls hidden" id="sidebarControls">
    <div class="control-section">
      <label class="control-label" id="languageLabel">Language:</label>
      <div class="language-selector">
        <button id="langPL" class="language-button" onclick="setLanguage('pl')">
          <img src="images/pl.png" alt="PL" class="flag-icon"> <span id="polishLabel">Polski</span>
        </button>
        <button id="langEN" class="language-button" onclick="setLanguage('en')">
          <img src="images/en.png" alt="EN" class="flag-icon"> <span id="englishLabel">English</span>
        </button>
      </div>
    </div>

    <div class="control-section">
      <label class="control-label" id="groupByLabel">Group by:</label>
      <div class="toggle-group">
        <label class="toggle-container">
          <input type="checkbox" id="toggleAuthor" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-label" id="authorToggle">Author</span>
        </label>
        <label class="toggle-container">
          <input type="checkbox" id="toggleCountry" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-label" id="countryToggle">Country</span>
        </label>
        <label class="toggle-container">
          <input type="checkbox" id="toggleCity" class="toggle-input">
          <span class="toggle-slider"></span>
          <span class="toggle-label" id="cityToggle">City</span>
        </label>
      </div>
    </div>

    <div class="control-section">
      <label class="control-label" id="sortByLabel">Sort by:</label>
      <select id="sortSelect" class="sort-select">
        <option value="order" id="optionOrder">Order Added</option>
        <option value="author-asc" id="optionAuthorAsc">Author (A-Z)</option>
        <option value="author-desc" id="optionAuthorDesc">Author (Z-A)</option>
        <option value="country-asc" id="optionCountryAsc">Country (A-Z)</option>
        <option value="country-desc" id="optionCountryDesc">Country (Z-A)</option>
        <option value="city-asc" id="optionCityAsc">City (A-Z)</option>
        <option value="city-desc" id="optionCityDesc">City (Z-A)</option>
        <option value="date-asc" id="optionDateAsc">Date (Oldest)</option>
        <option value="date-desc" id="optionDateDesc">Date (Newest)</option>
      </select>
    </div>
  </div>

  <div id="markerList" class="marker-list"></div>
</div>

<div id="map"></div>
<script>
  var map = L.map('map',{
    center: [53, 10],
    zoom: 3,
    zoomControl: false
  });

  // Add zoom control on the right side
  L.control.zoom({
    position: 'topright'
  }).addTo(map);

  var beerBottleIcon = L.icon({
    iconUrl: 'images/icon3.png',

    iconSize:     [12, 43.5], // size of the icon
    iconAnchor:   [6, 43.5],  // point of the icon which will correspond to marker's location
    popupAnchor:  [0, -43.5]  // point from which the popup should open relative to the iconAnchor
  });

  var beerCanIcon = L.icon({
    iconUrl: 'images/beer-can-small.png',

    iconSize:     [16, 39],
    iconAnchor:   [6, 39], 
    popupAnchor:  [2, -39] 
  });

  var defaultIcon = beerBottleIcon;

  // Function to create an icon with birthday cake emoji overlay
  function createAnniversaryIcon(baseIcon) {
    var iconUrl = baseIcon.options.iconUrl;
    var iconSize = baseIcon.options.iconSize;

    return L.divIcon({
      html: '<div style="position: relative; width: ' + iconSize[0] + 'px; height: ' + iconSize[1] + 'px;">' +
            '<img src="' + iconUrl + '" style="width: ' + iconSize[0] + 'px; height: ' + iconSize[1] + 'px;">' +
            '<span style="position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); font-size: 14px;">🎂</span>' +
            '</div>',
      iconSize: iconSize,
      iconAnchor: baseIcon.options.iconAnchor,
      popupAnchor: baseIcon.options.popupAnchor,
      className: 'anniversary-marker'
    });
  }

  // Expired: 2023-10-31
  // L.tileLayer('https://stamen-tiles.a.ssl.fastly.net/toner/{z}/{x}/{y}.png ',
  //             {attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap</a> contributors'}).addTo(map);

  // List of CartoDB maps: rastertiles/voyager, rastertiles/voyager_nolabels, rastertiles/voyager_only_labels, rastertiles/voyager_labels_under, 
  // rastertiles/voyager_no_buildings, rastertiles/voyager_only_labels_no_buildings, rastertiles/voyager_no_labels_no_buildings, light_all, 
  // light_nolabels, light_only_labels, dark_all, dark_nolabels, dark_only_labels, spotify_dark

  // Areas feature black water and gray land, while labels are displayed in white for countries and capitals and in black for regions.
  L.tileLayer('https://{s}.basemaps.cartocdn.com/spotify_dark/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/attributions">CartoDB</a>'
  }).addTo(map);

  // Dark 2nd choice
  // L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  //     attribution: '&copy; <a href="https://carto.com/attributions">CartoDB</a>'
  // }).addTo(map);


  // Original OSM
  // L.tileLayer('http://{s}.tile.osm.org/{z}/{x}/{y}.png',
  //            {attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap</a> contributors'}).addTo(map);

  // Topographic
  //   L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  //     attribution: '&copy; <a href="https://opentopomap.org">OpenTopoMap</a> contributors'
  // }).addTo(map);

  // Array to store marker references
  var leafletMarkers = [];

  for (var i = 0; i < markers.length; ++i) {
    // Get title based on language
    var title = (language === 'pl' && markers[i].titlePL) ? markers[i].titlePL : markers[i].title;

    // Get comment based on language
    var imgTag = '<img class="popup-image" src="' + markers[i].photo + '"';
    var comment = "";
    if (language === 'pl' && markers[i].commentPL) {
        comment = markers[i].commentPL;
    } else if (markers[i].comment) {
        comment = markers[i].comment;
    }
    if (comment) {
        imgTag += ' alt="'+comment+'"';
        imgTag += ' title="'+comment+'"';
    }
    imgTag += '/>';
    
    var shareIconSVG = '<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>';
    var checkIconSVG = '<svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

    var popupContent = '<div class="custom-popup-content">' +
                       '<h2 style="text-align: center; margin-bottom: 12px;"> ' + title + '</h2>' +
                       '<div class="popup-main-block">' +
                       '<div class="popup-image-container">' +
                       '<a href="' + markers[i].photo + '" target="_blank">' + imgTag + '</a>' +
                       '</div>' +
                       '<div class="popup-footer">' +
                       '<div class="popup-info' + (markers[i].datetime ? '' : ' no-date') + '">📷 ' + markers[i].author;
    if (markers[i].datetime) {
        popupContent += '<br>🗓️ ' + displayDate(markers[i].datetime);
    }
    popupContent += '</div>' + 
                    '<button class="share-btn" onclick="shareLocation(event, ' + markers[i].latitude + ', ' + markers[i].longitude + ', this)" data-original-svg=\'' + shareIconSVG + '\' data-check-svg=\'' + checkIconSVG + '\' title="' + t("shareLink") + '">' + shareIconSVG + '</button>' +
                    '</div>' +
                    '</div>' +
                    '</div>';

    var beerIcon = defaultIcon;
    if (markers[i].type == "can") {
      beerIcon = beerCanIcon;
    }

    // Check if this marker's date is an anniversary
    if (markers[i].datetime && isAnniversary(markers[i].datetime)) {
      beerIcon = createAnniversaryIcon(beerIcon);
    }

    var leafletMarker = L.marker([markers[i].latitude, markers[i].longitude], {icon: beerIcon})
    .bindPopup(popupContent, { autoPanPaddingTopLeft: [0, 80] })
    .addTo(map);

    leafletMarkers.push({
      marker: leafletMarker,
      data: markers[i],
      title: title,
      comment: comment,
      originalIndex: i,
      parsed: parseTitle(title)
    });
  }

  // Re-adjust popup padding and position automatically when an image finishes loading
  map.on('popupopen', function(e) {
      var popup = e.popup;
      var popupElem = popup.getElement();
      var img = popupElem.querySelector('img.popup-image');
      
      if (img) {
          if (!img.complete) {
              img.addEventListener('load', function() {
                  popup.update();
              });
          }

          // Mobile Touch-Pan Proxy Logic
          // This allows dragging the image to pan the map while still allowing clicks/taps to open the link
          var startX, startY, moved = false;
          
          img.addEventListener('touchstart', function(e) {
              startX = e.touches[0].clientX;
              startY = e.touches[0].clientY;
              moved = false;
          }, { passive: true });

          img.addEventListener('touchmove', function(e) {
              var dx = e.touches[0].clientX - startX;
              var dy = e.touches[0].clientY - startY;
              
              if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                  moved = true;
                  // Manually pan the map by the inverse delta
                  map.panBy([-dx, -dy], { animate: false });
                  startX = e.touches[0].clientX;
                  startY = e.touches[0].clientY;
              }
          }, { passive: true });

          img.addEventListener('touchend', function(e) {
              if (moved) {
                  // If we panned, prevent the link click from firing
                  e.preventDefault();
              }
          });
      }
  });

  // Current filter state
  var filterState = {
    groupByAuthor: false,
    groupByCountry: false,
    groupByCity: false,
    sortBy: 'order'
  };

  var lastFocusRef = null;
  var lastClickedMarkerRef = null;
  var consecutiveClickCount = 0;
  var highlightedMarkerRef = null;

  // Function to move map and focus on a specific marker
  function focusOnMarker(ref, skipListSelect) {
    if (!ref || !ref.marker) return;

    lastFocusRef = ref;
    var zoomLevel = 13;
    if (map.getZoom() > 13) zoomLevel = map.getZoom();

    // Position marker in the lower part of screen — popup modal opens above
    var mapHeight = map._container.offsetHeight;
    var targetY = mapHeight * 0.75; // Marker at 75% from top (bottom quarter)
    
    var point = map.project([ref.data.latitude, ref.data.longitude], zoomLevel);
    point.y += (mapHeight / 2 - targetY); // Shift center UP so marker appears LOW on screen
    var newCenter = map.unproject(point, zoomLevel);

    map.flyTo(newCenter, zoomLevel, {
      duration: (tourState === 'playing') ? 2.0 : 1.2,
      easeLinearity: 0.1  // Strong ease-in / ease-out (slow start, fast middle, slow end)
    });

    map.once('moveend', function() {
      ref.marker.openPopup();
    });

    if (!skipListSelect && window.innerWidth < 768) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarToggle').classList.remove('hidden');
    }
  }

  // Global Toast function
  function showToast(message) {
      var toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(function() {
          toast.classList.remove('show');
      }, 3000);
  }

  // URL Share logic
  window.shareLocation = function(event, lat, lon, btn) {
      event.preventDefault();
      event.stopPropagation();
      
      var baseUrl = window.location.origin + window.location.pathname;
      
      if (window.self !== window.top) {
          try {
              if (document.referrer) {
                  var refUrl = new URL(document.referrer);
                  // Use parent origin and path as the base, dropping its old query params
                  baseUrl = refUrl.origin + refUrl.pathname;
              }
          } catch(e) {}
      }
      
      var shareUrl = baseUrl + '?x=' + parseFloat(lon).toFixed(6) + '&y=' + parseFloat(lat).toFixed(6);
      
      navigator.clipboard.writeText(shareUrl).then(function() {
          var originalSvg = btn.getAttribute('data-original-svg');
          var checkSvg = btn.getAttribute('data-check-svg');
          
          // Step 1: Success Checkmark
          btn.innerHTML = checkSvg;
          btn.style.background = 'rgba(76, 175, 80, 0.9)';
          btn.style.color = 'white';
          
          showToast(t("linkCopied"));
          
          // Step 2: Flip to Beer
          setTimeout(function() {
              btn.classList.add('animate-beer');
              setTimeout(function() {
                  btn.innerHTML = '<span style="font-size: 16px; line-height: 1;">🍺</span>';
              }, 250); // Mid-point of the flip
          }, 700);
          
          // Step 3: Reset
          setTimeout(function() {
              btn.classList.remove('animate-beer');
              btn.innerHTML = originalSvg;
              btn.style.background = '';
              btn.style.color = '';
          }, 3500);
      }).catch(function(err) {
          console.error("Clipboard copy failed: ", err);
      });
  };

  // --- Explore the World (World Tour) Logic ---
  // States: 'idle' (🌍), 'playing' (⏸), 'paused' (▶)
  var tourState = 'idle';
  var tourSequence = [];  // Fixed sorted order, computed once
  var tourIndex = 0;
  var tourTimer = null;
  var playRevertTimer = null;

  // Build a proximity-sorted sequence starting from a given marker.
  // This sequence is FIXED once computed — the tour always follows this order.
  function calculateTourSequence(startRef) {
      if (leafletMarkers.length === 0) return [];
      
      var sequence = [];
      var unvisited = leafletMarkers.slice();
      var current = startRef || unvisited[Math.floor(Math.random() * unvisited.length)];
      
      var idx = unvisited.indexOf(current);
      if (idx > -1) unvisited.splice(idx, 1);
      sequence.push(current);
      
      // Greedy nearest neighbor to build a geographic route
      while (unvisited.length > 0) {
          var nearest = null;
          var minDist = Infinity;
          var nearestIdx = -1;
          
          for (var i = 0; i < unvisited.length; i++) {
              var d = Math.pow(unvisited[i].data.latitude - current.data.latitude, 2) + 
                      Math.pow(unvisited[i].data.longitude - current.data.longitude, 2);
              if (d < minDist) {
                  minDist = d;
                  nearest = unvisited[i];
                  nearestIdx = i;
              }
          }
          
          if (nearest) {
              sequence.push(nearest);
              unvisited.splice(nearestIdx, 1);
              current = nearest;
          } else {
              break;
          }
      }
      return sequence;
  }

  // Find a marker's index in the tour sequence
  function findInTourSequence(ref) {
      for (var i = 0; i < tourSequence.length; i++) {
          if (tourSequence[i] === ref) return i;
      }
      return -1;
  }

  function setTourButton(state) {
      var btn = document.getElementById('worldTourBtn');
      if (state === 'playing') {
          btn.innerHTML = '⏸';
          btn.classList.add('active');
          btn.title = t('stopTour');
      } else if (state === 'paused') {
          btn.innerHTML = '▶';
          btn.classList.remove('active');
          btn.title = t('worldTour');
      } else {
          btn.innerHTML = '🌍';
          btn.classList.remove('active');
          btn.title = t('worldTour');
      }
  }

  function startTour() {
      if (leafletMarkers.length === 0) return;
      
      if (playRevertTimer) { clearTimeout(playRevertTimer); playRevertTimer = null; }
      
      tourState = 'playing';
      setTourButton('playing');
      
      // Build the fixed sorted sequence (computed once per tour start from idle)
      var startFrom = lastFocusRef || leafletMarkers[Math.floor(Math.random() * leafletMarkers.length)];
      tourSequence = calculateTourSequence(startFrom);
      
      // Set tourIndex to the NEXT marker after startFrom in the sequence
      var startIdx = findInTourSequence(startFrom);
      tourIndex = (startIdx + 1) % tourSequence.length;
      
      // If a popup is currently open, wait 2 seconds before closing and starting
      var hasOpenPopup = map._popup && map._popup.isOpen && map._popup.isOpen();
      if (hasOpenPopup) {
          tourTimer = setTimeout(function() {
              if (tourState !== 'playing') return;
              map.closePopup();
              setTimeout(function() {
                  if (tourState !== 'playing') return;
                  tourFlyToNext();
              }, 300);
          }, 2000);
      } else {
          tourFlyToNext();
      }
  }

  function pauseTour() {
      if (tourState !== 'playing') return;
      tourState = 'paused';
      
      if (tourTimer) { clearTimeout(tourTimer); tourTimer = null; }
      isSlotAnimating = false;
      clearTourListHighlights();
      
      setTourButton('paused');
      
      // After 10 seconds idle in paused state, revert to globe
      playRevertTimer = setTimeout(function() {
          if (tourState === 'paused') {
              stopTour();
          }
      }, 10000);
  }

  function stopTour() {
      if (playRevertTimer) { clearTimeout(playRevertTimer); playRevertTimer = null; }
      if (tourTimer) { clearTimeout(tourTimer); tourTimer = null; }
      
      tourState = 'idle';
      isSlotAnimating = false;
      setTourButton('idle');
      clearTourListHighlights();
      map.closePopup();
  }

  function resumeTour() {
      if (tourState !== 'paused') return;
      
      if (playRevertTimer) { clearTimeout(playRevertTimer); playRevertTimer = null; }
      
      tourState = 'playing';
      setTourButton('playing');
      
      // If user clicked a marker during pause, update tourIndex to next after it
      if (lastFocusRef) {
          var pos = findInTourSequence(lastFocusRef);
          if (pos !== -1) {
              tourIndex = (pos + 1) % tourSequence.length;
          }
      }
      
      var hasOpenPopup = map._popup && map._popup.isOpen && map._popup.isOpen();
      if (hasOpenPopup) {
          tourTimer = setTimeout(function() {
              if (tourState !== 'playing') return;
              map.closePopup();
              setTimeout(function() {
                  if (tourState !== 'playing') return;
                  tourFlyToNext();
              }, 300);
          }, 2000);
      } else {
          tourFlyToNext();
      }
  }

  // --- World Tour Slot Animation State ---
  var visibleListOrder = [];
  var isSlotAnimating = false;
  var slotTimer = null;

  function refreshVisibleListOrder() {
      visibleListOrder = [];
      var items = document.querySelectorAll('.marker-item');
      items.forEach(function(item) {
          var idx = parseInt(item.dataset.index);
          if (leafletMarkers[idx]) {
              visibleListOrder.push(leafletMarkers[idx]);
          }
      });
  }

  function clearTourListHighlights() {
      document.querySelectorAll('.marker-item').forEach(function(item) {
          item.classList.remove('tour-silver', 'tour-gold');
      });
  }

  function runSlotAnimation(targetRef, onComplete) {
      if (slotTimer) { clearTimeout(slotTimer); slotTimer = null; }
      
      if (visibleListOrder.length === 0) {
          if (onComplete) onComplete();
          return;
      }

      var sidebar = document.getElementById('sidebar');
      if (!sidebar.classList.contains('open')) {
          if (onComplete) onComplete();
          return;
      }

      isSlotAnimating = true;
      clearTourListHighlights();

      var startIdx = -1;
      var currentGold = document.querySelector('.marker-item.tour-gold');
      if (currentGold) {
          startIdx = findInVisibleList(leafletMarkers[parseInt(currentGold.dataset.index)]);
      } else if (lastFocusRef) {
          startIdx = findInVisibleList(lastFocusRef);
      }
      
      if (startIdx === -1) startIdx = 0;
      
      var targetIdx = findInVisibleList(targetRef);
      if (targetIdx === -1) {
          if (onComplete) onComplete();
          return;
      }

      var totalSteps = targetIdx - startIdx;
      if (totalSteps < 0) totalSteps += visibleListOrder.length;
      
      // If we are already there, nothing to do
      if (totalSteps === 0) {
          if (onComplete) onComplete();
          return;
      }

      // Target total duration ~1.6 seconds, but not more than 30ms per step for consistency
      var targetDuration = 1600; 
      var avgDelay = targetDuration / totalSteps;
      
      // For large distances, we will "skip" updates to keep it smooth
      var skipFactor = 1;
      if (totalSteps > 150) skipFactor = 4;
      else if (totalSteps > 80) skipFactor = 2;

      var currentStep = 0;
      var currentPos = startIdx;

      function nextStep() {
          if (tourState === 'idle' || !isSlotAnimating) {
              isSlotAnimating = false;
              return;
          }

          // Clean up previous highlight
          var prevElem = document.getElementById('marker-item-' + visibleListOrder[currentPos].originalIndex);
          if (prevElem) prevElem.classList.remove('tour-silver');

          // Decide how many items to jump this frame
          // Always 1-by-1 for the first 10 and last 15 steps for precision/feel
          var actualStepSize = 1;
          if (currentStep > 10 && currentStep < totalSteps - 15) {
              actualStepSize = skipFactor;
          }
          
          currentPos = (currentPos + actualStepSize) % visibleListOrder.length;
          currentStep += actualStepSize;

          // If we overshoot due to skipFactor, clamp it
          if (currentStep > totalSteps) {
              var overshoot = currentStep - totalSteps;
              currentPos = (currentPos - overshoot + visibleListOrder.length) % visibleListOrder.length;
              currentStep = totalSteps;
          }

          var currentElem = document.getElementById('marker-item-' + visibleListOrder[currentPos].originalIndex);
          if (currentElem) {
              currentElem.classList.add('tour-silver');
              
              // Only scroll every few frames if skipping, to avoid jitter
              var isLastStep = (currentStep >= totalSteps);
              
              // NEW: Trigger scroll earlier if we're past the midpoint to keep destination closer
              var shouldScroll = isLastStep || (currentStep % skipFactor === 0);
              if (shouldScroll) {
                  currentElem.scrollIntoView({ 
                      behavior: isLastStep ? 'smooth' : 'auto', 
                      block: 'center' 
                  });
              }
          }

          if (currentStep >= totalSteps) {
              if (currentElem) {
                  currentElem.classList.remove('tour-silver');
                  currentElem.classList.add('tour-gold');
              }
              isSlotAnimating = false;
              if (onComplete) onComplete();
          } else {
              // Speed curve: ease-in-out
              var progress = currentStep / totalSteps;
              var delay = avgDelay * actualStepSize; // compensate delay for skipped steps
              
              if (progress < 0.15) delay = Math.max(delay, 40); // slow start
              else if (progress > 0.85) delay = Math.max(delay, 30); // slow end
              else delay = Math.max(delay * 0.4, 8); // fast reel
              
              slotTimer = setTimeout(nextStep, delay);
          }
      }

      nextStep();
  }

  function findInVisibleList(ref) {
      for (var i = 0; i < visibleListOrder.length; i++) {
          if (visibleListOrder[i] === ref) return i;
      }
      return -1;
  }

  function tourFlyToNext() {
      if (tourState !== 'playing') return;
      
      if (tourIndex >= tourSequence.length) {
          tourIndex = 0;
      }
      
      var targetRef = tourSequence[tourIndex];
      tourIndex++;
      if (tourIndex >= tourSequence.length) tourIndex = 0;
      
      map.closePopup();

      // Start animations in parallel
      var sidebar = document.getElementById('sidebar');
      if (sidebar.classList.contains('open')) {
          // Ensure the target element is visible (expand groups if necessary)
          var itemElem = document.getElementById('marker-item-' + targetRef.originalIndex);
          if (itemElem) {
              var parentContent = itemElem.closest('.group-content');
              if (parentContent && parentContent.classList.contains('hidden')) {
                  var header = parentContent.previousElementSibling;
                  if (header && header.classList.contains('group-header')) {
                      header.click();
                  }
              }
          }
          
          runSlotAnimation(targetRef); 
      }
      
      focusOnMarker(targetRef, true);
      
      // After arriving, popup opens (via focusOnMarker). Wait 3s then continue.
      map.once('moveend', function() {
          if (tourState !== 'playing') return;
          tourTimer = setTimeout(function() {
              if (tourState !== 'playing') return;
              map.closePopup();
              setTimeout(function() {
                  if (tourState !== 'playing') return;
                  tourFlyToNext();
              }, 500);
          }, 3000);
      });
  }

  // Always track which marker was last opened (for tour starting point)
  // Also update tourIndex during active tour so the next slide follows the clicked marker
  map.on('popupopen', function(e) {
      var popup = e.popup;
      var foundRef = null;

      for (var i = 0; i < leafletMarkers.length; i++) {
          if (leafletMarkers[i].marker.getPopup() === popup) {
              foundRef = leafletMarkers[i];
              lastFocusRef = foundRef;
              
              // --- Double Click to Highlight Logic ---
              if (foundRef === lastClickedMarkerRef) {
                  consecutiveClickCount++;
              } else {
                  consecutiveClickCount = 1;
                  lastClickedMarkerRef = foundRef;
                  // ONLY clear if we are NOT in the middle of a tour.
                  // During tour, runSlotAnimation handles the highlight timing.
                  if (tourState === 'idle') {
                      clearTourListHighlights();
                      highlightedMarkerRef = null;
                  }
              }

              if (consecutiveClickCount >= 2) {
                  var itemElem = document.getElementById('marker-item-' + foundRef.originalIndex);
                  if (itemElem) {
                      clearTourListHighlights();
                      itemElem.classList.add('tour-gold');
                      highlightedMarkerRef = foundRef;
                      
                      // Auto-expand group if it's hidden
                      var parentContent = itemElem.closest('.group-content');
                      if (parentContent && parentContent.classList.contains('hidden')) {
                          var header = parentContent.previousElementSibling;
                          if (header && header.classList.contains('group-header')) {
                              header.click();
                          }
                      }
                      
                      // Scroll if sidebar is open
                      var sidebar = document.getElementById('sidebar');
                      if (sidebar.classList.contains('open')) {
                          itemElem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                      }
                  }
              }
              // ----------------------------------------

              // During tour, update the index to continue from this marker
              if (tourState === 'playing' || tourState === 'paused') {
                  var pos = findInTourSequence(foundRef);
                  if (pos !== -1) {
                      tourIndex = (pos + 1) % tourSequence.length;
                  }
              }
              break;
          }
      }
  });

  // Function to find marker using URL parameters logic
  function findMarkerRefByParams(q, lat, lon) {
    if (lat || lon) {
      var searchLat = lat ? parseFloat(lat) : null;
      var searchLon = lon ? parseFloat(lon) : null;
      var closestMarker = null;
      var minDistance = Infinity;

      for (var i = 0; i < leafletMarkers.length; i++) {
         var mLat = leafletMarkers[i].data.latitude;
         var mLon = leafletMarkers[i].data.longitude;
         var dist = 0;
         
         if (searchLat !== null && searchLon !== null) {
             dist = Math.pow(mLat - searchLat, 2) + Math.pow(mLon - searchLon, 2);
         } else if (searchLat !== null) {
             dist = Math.abs(mLat - searchLat);
         } else if (searchLon !== null) {
             dist = Math.abs(mLon - searchLon);
         }

         if (dist < minDistance) {
             minDistance = dist;
             closestMarker = leafletMarkers[i];
         }
      }
      
      // Allow minor floating point drift up to e.g. ~10km max threshold
      if (closestMarker && minDistance < 0.05) {
          return closestMarker;
      }
    } else if (q) {
      var query = q.toLowerCase();
      var foundIndex = -1;
      
      var checkMatch = function(field) {
          if (!field) return false;
          return field.toString().toLowerCase().indexOf(query) !== -1;
      };

      var checks = [
          'photo', 'title', 'titlePL', 'comment', 'commentPL', 'author', 'datetime'
      ];

      for (var c = 0; c < checks.length && foundIndex === -1; c++) {
          for (var i = 0; i < leafletMarkers.length && foundIndex === -1; i++) {
              if (checkMatch(leafletMarkers[i].data[checks[c]])) {
                  foundIndex = i;
              }
          }
      }

      if (foundIndex !== -1) {
          return leafletMarkers[foundIndex];
      }
    }
    return null;
  }

  // Function to sort markers
  function sortMarkers(markersList, sortBy) {
    var sorted = markersList.slice();

    if (sortBy === 'author-asc') {
      sorted.sort(function(a, b) {
        return a.data.author.localeCompare(b.data.author, 'pl', { sensitivity: 'accent' });
      });
    } else if (sortBy === 'author-desc') {
      sorted.sort(function(a, b) {
        return b.data.author.localeCompare(a.data.author, 'pl', { sensitivity: 'accent' });
      });
    } else if (sortBy === 'country-asc') {
      sorted.sort(function(a, b) {
        var countryA = a.parsed.country || 'Unknown';
        var countryB = b.parsed.country || 'Unknown';
        return countryA.localeCompare(countryB, 'pl', { sensitivity: 'accent' });
      });
    } else if (sortBy === 'country-desc') {
      sorted.sort(function(a, b) {
        var countryA = a.parsed.country || 'Unknown';
        var countryB = b.parsed.country || 'Unknown';
        return countryB.localeCompare(countryA, 'pl', { sensitivity: 'accent' });
      });
    } else if (sortBy === 'city-asc') {
      sorted.sort(function(a, b) {
        var cityA = a.parsed.city || 'Unknown';
        var cityB = b.parsed.city || 'Unknown';
        return cityA.localeCompare(cityB, 'pl', { sensitivity: 'accent' });
      });
    } else if (sortBy === 'city-desc') {
      sorted.sort(function(a, b) {
        var cityA = a.parsed.city || 'Unknown';
        var cityB = b.parsed.city || 'Unknown';
        return cityB.localeCompare(cityA, 'pl', { sensitivity: 'accent' });
      });
    } else if (sortBy === 'date-asc') {
      sorted.sort(function(a, b) {
        var dateA = a.data.datetime ? new Date(a.data.datetime).getTime() : 0;
        var dateB = b.data.datetime ? new Date(b.data.datetime).getTime() : 0;
        return dateA - dateB;
      });
    } else if (sortBy === 'date-desc') {
      sorted.sort(function(a, b) {
        var dateA = a.data.datetime ? new Date(a.data.datetime).getTime() : 0;
        var dateB = b.data.datetime ? new Date(b.data.datetime).getTime() : 0;
        return dateB - dateA;
      });
    } else {
      // 'order' - keep original order
      sorted.sort(function(a, b) {
        return a.originalIndex - b.originalIndex;
      });
    }

    return sorted;
  }

  // URL Parameter Handling for Dynamic Marker Focus
  function handleUrlParams() {
    var q, lat, lon;
    
    var ownParams = new URLSearchParams(window.location.search);
    q = ownParams.get('q');
    lat = ownParams.get('lat') || ownParams.get('y');
    lon = ownParams.get('lon') || ownParams.get('x');

    if (window.self !== window.top && !q && !lat && !lon) {
        try {
            if (window.top.location.search) {
                var parentParams = new URLSearchParams(window.top.location.search);
                q = parentParams.get('q') || q;
                lat = parentParams.get('lat') || parentParams.get('y') || lat;
                lon = parentParams.get('lon') || parentParams.get('x') || lon;
            }
        } catch(e) {
            try {
                if (document.referrer) {
                    var refUrl = new URL(document.referrer);
                    q = refUrl.searchParams.get('q') || q;
                    lat = refUrl.searchParams.get('lat') || refUrl.searchParams.get('y') || lat;
                    lon = refUrl.searchParams.get('lon') || refUrl.searchParams.get('x') || lon;
                }
            } catch(e2) {}
        }
    }

    var foundMarkerRef = findMarkerRefByParams(q, lat, lon);

    if (foundMarkerRef) {
        setTimeout(function() {
            focusOnMarker(foundMarkerRef, true);
        }, 600);
        return true;
    }
    return false;
  }

  // Support postMessage from parent iframe
  window.addEventListener("message", function(event) {
      if (event.data && typeof event.data === 'object' && event.data.type === 'mapFocus') {
          // 1. Check for marker focus
          var foundMarkerRef = findMarkerRefByParams(event.data.q, event.data.lat || event.data.y, event.data.lon || event.data.x);
          if (foundMarkerRef) {
              focusOnMarker(foundMarkerRef, true);
          }
          
          // 2. Check for auto-tour
          var autoTour = (event.data.zwiedzam === 'swiat') || (event.data.explore === 'world');
          if (autoTour) {
              if (foundMarkerRef) {
                  // Wait for the requested focus to complete before starting tour
                  map.once('popupopen', function() {
                      setTimeout(function() { startTour(); }, 3000);
                  });
              } else {
                  startTour();
              }
          }
      }
  });

  var hasFocusParam = handleUrlParams();

  // Auto-start World Tour if URL contains ?zwiedzam=swiat or ?explore=world
  (function checkAutoTour() {
      var params = new URLSearchParams(window.location.search);
      var autoTour = (params.get('zwiedzam') === 'swiat') || (params.get('explore') === 'world');
      
      if (!autoTour && window.self !== window.top) {
          try {
              var parentParams = new URLSearchParams(window.top.location.search);
              autoTour = (parentParams.get('zwiedzam') === 'swiat') || (parentParams.get('explore') === 'world');
          } catch(e) {
              try {
                  if (document.referrer) {
                      var refUrl = new URL(document.referrer);
                      autoTour = (refUrl.searchParams.get('zwiedzam') === 'swiat') || (refUrl.searchParams.get('explore') === 'world');
                  }
              } catch(e2) {}
          }
      }
      
      if (autoTour) {
          if (hasFocusParam) {
              // Wait for the initial marker focus to complete (popup opens), then start tour
              map.once('popupopen', function() {
                  setTimeout(function() { startTour(); }, 3000);
              });
          } else {
              setTimeout(function() { startTour(); }, 1500);
          }
      }
  })();

</script>
